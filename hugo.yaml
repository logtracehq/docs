# Hugo configuration file
title: Logtrace - Audit, Session and Event Logging in Any Programming Language

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: API Keys
      url: "https://app.logtracehq.com/api-keys"
      weight: 1
    - name: Contact
      url: "mailto:team@logtracehq.com"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/logtracehq/docs"
      params:
        icon: github
    - name: Discord
      weight: 6
      url: "https://discord.gg/JmP3JuFZXU"
      params:
        icon: discord

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logtrace_icon.webp
      alt: Logtrace Logo
      height: 60

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/logtracehq/docs/edit/main/content"
